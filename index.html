<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://br.pinterest.com/fhelenags/pocoyo/" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/profile.png" class="avatar">
      <div>
        <span class="name">Ana Flavia </span>
        <span class="username">@ana</span>
      </div>
    </div>

    <p class="post-text">
     ola, eu sou a aninha tenho 17 aninhos kkkk🚀
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

 <div class="post-actions">
      <button id="likeBtn">descurtir</button>
      <span id="descurtirCount">0</span>
    </div>


    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Sou estudante do terceiro ano do E.M🔥</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Gosto muito de pessoas engraçadas!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
